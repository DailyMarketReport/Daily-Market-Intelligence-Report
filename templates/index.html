<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Market Intelligence Hub</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0a1120; color: #f1f5f9; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #161e2e; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #2d3748; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        h1 { font-size: 1.6rem; color: #ffffff; margin-bottom: 30px; border-left: 5px solid #38bdf8; padding-left: 15px; }
        h2 { font-size: 1.1rem; color: #38bdf8; margin-top: 0; margin-bottom: 20px; }
        .chart-container { height: 450px; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .box { background: #1f293a; padding: 18px; border-radius: 12px; text-align: center; }
        .label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 6px; }
        .val { font-size: 1.3rem; font-weight: bold; color: #ffffff; }
        .news-item { padding: 15px 0; border-bottom: 1px solid #2d3748; display: flex; align-items: flex-start; }
        .news-item:last-child { border-bottom: none; }
        .news-time { font-size: 0.75rem; color: #64748b; background: #0a1120; padding: 3px 7px; border-radius: 4px; margin-right: 15px; margin-top: 3px; }
        .news-link { color: #e2e8f0; text-decoration: none; line-height: 1.6; font-size: 0.95rem; }
        .news-link:hover { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 市場情報監控中心</h1>

        <div class="card">
            <h2>📈 S&P 500 指數日線圖 (Daily Chart)</h2>
            <div class="chart-container">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_chart"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "CME_MINI:ES1!", 
                        "interval": "D", // 這裡已改為 D (日線)
                        "timezone": "America/New_York",
                        "theme": "dark",
                        "style": "1",
                        "locale": "zh_TW",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "hide_side_toolbar": false,
                        "allow_symbol_change": true,
                        "details": true, // 開啟詳細資訊
                        "hotlist": true, // 開啟右側熱點
                        "container_id": "tradingview_chart"
                    });
                    </script>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🇺🇸 美國國債收益率</h2>
            <div class="grid">
                {% if rates %}
                    {% for label, val in rates.items() %}
                    <div class="box">
                        <span class="label">{{ label }}期</span>
                        <span class="val">{{ val }}</span>
                    </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>

        <div class="card">
            <h2>📰 Yahoo 財經即時快訊 (中文)</h2>
            {% if news %}
                {% for item in news %}
                <div class="news-item">
                    <span class="news-time">{{ item.time }}</span>
                    <a class="news-link" href="{{ item.link }}" target="_blank">{{ item.title }}</a>
                </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</body>
</html>
