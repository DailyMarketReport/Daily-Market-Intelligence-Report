<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Victor Market Intelligence Hub</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0a1120; --card-bg: #161e2e; --text: #f1f5f9; --accent: #fbbf24; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .dashboard { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; border: 1px solid #2d3748; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; font-size: 1.1rem; }
        
        /* 佈局 */
        .grid-2-1 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .rate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .rate-box { background: #1f293a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #2d3748; }
        .rate-val { font-size: 1.3rem; font-weight: bold; display: block; }

        /* 報告列表 */
        .report-item { background: #1f293a; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #334155; margin-bottom: 10px; }
        .report-item:hover { border-color: var(--primary); }

        /* 側邊抽屜 */
        #reportDrawer {
            position: fixed; top: 0; right: -650px; width: 580px; height: 100%;
            background: #111827; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            transition: 0.4s; z-index: 9999; padding: 40px; overflow-y: auto;
            border-left: 2px solid var(--primary);
        }
        #reportDrawer.open { right: 0; }
        .drawer-close { background: none; border: none; color: var(--primary); font-size: 2.5rem; cursor: pointer; position: absolute; top: 10px; right: 20px; }

        /* Markdown 樣式修復 */
        .markdown-content { line-height: 1.8; color: #cbd5e1; }
        .markdown-content h1, .markdown-content h2 { color: var(--primary); }
        .markdown-content ul { padding-left: 20px; }
        .markdown-content li { margin-bottom: 10px; }
        .markdown-content strong { color: var(--accent); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h2> 美國國債收益率</h2>
        <div class="rate-grid">
            {% for label, val in rates.items() %}
            <div class="rate-box"><small>{{ label }}期</small><span class="rate-val">{{ val }}</span></div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h2>💰 市場關鍵指標</h2>
        <div class="rate-grid">
            {% for name, price in other_assets.items() %}
            <div class="rate-box"><small>{{ name }}</small><span class="rate-val" style="color:var(--accent)">{{ price }}</span></div>
            {% endfor %}
        </div>
    </div>

    <div class="grid-2-1">
        <div class="card">
            <h2>📈 市場即時圖表</h2>
            <div id="tv_chart" style="height:500px;"></div>
        </div>

        <div class="card">
            <h2>✍️ 深度分析報告庫</h2>
            <div style="max-height:460px; overflow-y:auto;">
                {% for report in reports %}
                <div class="report-item" onclick='openDrawer({{ report.title | tojson }}, {{ report.content | tojson }})'>
                    <strong>📁 {{ report.title }}</strong><br>
                    <small style="color:var(--accent)">點擊閱讀全文</small>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<div id="reportDrawer">
    <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    <h1 id="drawerTitle"></h1>
    <hr style="border:0; border-top:1px solid #2d3748; margin:20px 0;">
    <div id="drawerBody" class="markdown-content"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 初始化 TradingView
    new TradingView.widget({
        "container_id": "tv_chart", "autosize": true, "symbol": "NASDAQ:NVDA", "interval": "D", "theme": "dark", "style": "1", "locale": "zh_TW",
        "watchlist": ["NASDAQ:ISRG", "NYSE:PTY", "NYSE:DB", "NYSE:MRK", "NYSE:TSN", "NASDAQ:NVDA", "NASDAQ:RKLB", "BATS:AR"]
    });

    // 抽屜控制
    function openDrawer(title, contentHtml) {
        document.getElementById('drawerTitle').innerText = title;
        document.getElementById('drawerBody').innerHTML = contentHtml; // 注入 HTML
        document.getElementById('reportDrawer').classList.add('open');
    }
    function closeDrawer() {
        document.getElementById('reportDrawer').classList.remove('open');
    }
</script>
</body>
</html>
