<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Victor Market Monitor</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .box { background: #334155; padding: 15px; border-radius: 8px; text-align: center; }
        .news-item { padding: 10px 0; border-bottom: 1px solid #334155; }
        a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>📊 市場情報監控中心</h1>

        <div class="card">
            <h2>美國國債收益率</h2>
            <div class="grid">
                {% if rates %}
                    {% for label, val in rates.items() %}
                    <div class="box">
                        <small style="color: #94a3b8;">{{ label }}</small><br>
                        <strong>{{ val }}</strong>
                    </div>
                    {% endfor %}
                {% else %}
                    <p>數據讀取中...</p>
                {% endif %}
            </div>
        </div>

        <div class="card">
            <h2>🏮 Yahoo 財經即時快訊 (中文)</h2>
            {% if news %}
                {% for item in news %}
                <div class="news-item">
                    <small style="color: #64748b;">{{ item.time }}</small> | 
                    <a href="{{ item.link }}" target="_blank">{{ item.title }}</a>
                </div>
                {% endfor %}
            {% else %}
                <p>暫無新聞</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
