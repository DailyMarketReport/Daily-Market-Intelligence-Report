<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mag 7 & Market Intelligence</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0a1120; color: #f1f5f9; margin: 0; padding: 0; }
        .dashboard { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #161e2e; border-radius: 12px; border: 1px solid #2d3748; padding: 20px; margin-bottom: 20px; }
        h2 { font-size: 1rem; color: #38bdf8; margin-top: 0; margin-bottom: 15px; border-left: 4px solid #38bdf8; padding-left: 10px; }
        
        /* 雙欄佈局 */
        .layout-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        @media (max-width: 1000px) { .layout-grid { grid-template-columns: 1fr; } }

        /* 圖表高度 */
        .chart-main { height: 500px; border-radius: 8px; overflow: hidden; }
        
        /* 國債樣式 */
        .rate-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .rate-box { background: #1f293a; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #2d3748; }
        .rate-label { font-size: 0.7rem; color: #94a3b8; display: block; }
        .rate-val { font-size: 1.1rem; font-weight: bold; color: #ffffff; }

        /* 新聞列表 */
        .news-list { max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .news-item { padding: 12px 0; border-bottom: 1px solid #2d3748; display: flex; align-items: flex-start; }
        .news-time { font-size: 0.7rem; color: #64748b; background: #0a1120; padding: 2px 6px; border-radius: 4px; margin-right: 12px; min-width: 40px; text-align: center; }
        .news-link { color: #e2e8f0; text-decoration: none; font-size: 0.95rem; line-height: 1.5; }
        .news-link:hover { color: #38bdf8; }
    </style>
</head>
<body>

    <div style="border-bottom: 1px solid #2d3748;">
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "NASDAQ:NVDA", "title": "NVDA"},
                {"proName": "NASDAQ:AAPL", "title": "Apple"},
                {"proName": "NASDAQ:MSFT", "title": "Microsoft"},
                {"proName": "NASDAQ:AMZN", "title": "Amazon"},
                {"proName": "NASDAQ:GOOGL", "title": "Google"},
                {"proName": "NASDAQ:META", "title": "Meta"},
                {"proName": "NASDAQ:TSLA", "title": "Tesla"}
            ],
            "colorTheme": "dark", "locale": "zh_TW"
            }
            </script>
        </div>
    </div>

    <div class="dashboard">
        
        <div class="card">
            <h2>美國國債收益率</h2>
            <div class="rate-grid">
                {% for label, val in rates.items() %}
                <div class="rate-box">
                    <span class="rate-label">{{ label }}期</span>
                    <span class="rate-val">{{ val }}</span>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="layout-grid">
            
            <div class="card">
                <h2>MAG 7 最新資訊</h2>
                <div class="chart-main">
                    <div id="tv_mag7" style="height:100%;width:100%"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "NASDAQ:NVDA", // 以 NVDA 為主
                        "interval": "D",
                        "timezone": "America/New_York",
                        "theme": "dark",
                        "style": "1",
                        "locale": "zh_TW",
                        "enable_publishing": false,
                        "allow_symbol_change": true,
                        "watchlist": [
                            "NASDAQ:NVDA",
                            "NASDAQ:AAPL",
                            "NASDAQ:MSFT",
                            "NASDAQ:AMZN",
                            "NASDAQ:GOOGL",
                            "NASDAQ:META",
                            "NASDAQ:TSLA"
                        ],
                        "container_id": "tv_mag7"
                    });
                    </script>
                </div>
            </div>

            <div class="card">
                <h2>🏮 Yahoo 財經即時快訊 (中文)</h2>
                <div class="news-list">
                    {% if news %}
                        {% for item in news %}
                        <div class="news-item">
                            <span class="news-time">{{ item.time }}</span>
                            <a class="news-link" href="{{ item.link }}" target="_blank">{{ item.title }}</a>
                        </div>
                        {% endfor %}
                    {% endif %}
                </div>
            </div>

        </div>
    </div>
</body>
</html>
