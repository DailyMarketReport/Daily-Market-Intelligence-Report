<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Victor's Market Intelligence</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .news-item { border-bottom: 1px solid #334155; padding: 10px 0; }
        .rate-grid { display: flex; gap: 20px; }
        .rate-box { background: #334155; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>📊 市場情報監控</h1>

    <div class="card">
        <h2>🇺🇸 美國國債利率</h2>
        <div class="rate-grid">
            {% for tenor, val in rates.items() %}
            <div class="rate-box">
                <strong>{{ tenor }}:</strong> {{ val }}
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h2>🔥 Finviz 即時新聞</h2>
        {% for item in news %}
        <div class="news-item">
            <small>{{ item.time }}</small> | <strong>{{ item.title }}</strong>
        </div>
        {% endfor %}
    </div>
</body>
</html>
